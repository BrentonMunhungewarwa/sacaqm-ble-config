<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>SACAQM — Node Provisioning</title>

<style>
:root{
  --bg:#f4f7fb;
  --card:#ffffff;
  --border:#e2e8f0;
  --muted:#64748b;
  --primary:#0ea5a4;
  --primary2:#22c55e;
}
*{box-sizing:border-box}
body{margin:0;font-family:Inter,system-ui,-apple-system,"Segoe UI",Roboto;background:var(--bg);color:#0f172a;padding:30px}
.container{max-width:1100px;margin:auto}
h1{margin-bottom:20px}
.stepper{display:flex;justify-content:space-between;margin-bottom:25px}
.step{flex:1;text-align:center;position:relative}
.step:not(:last-child)::after{content:"";position:absolute;top:18px;right:-50%;width:100%;height:2px;background:#cbd5e1;z-index:0}
.step-circle{width:36px;height:36px;border-radius:50%;margin:auto;background:#e2e8f0;display:flex;align-items:center;justify-content:center;font-weight:600;z-index:1;position:relative}
.step.active .step-circle{background:linear-gradient(90deg,var(--primary),var(--primary2));color:white}
.step.completed .step-circle{background:#22c55e;color:white}
.step-label{margin-top:8px;font-size:13px}
.grid{display:grid;grid-template-columns:1fr 380px;gap:20px}@media(max-width:900px){.grid{grid-template-columns:1fr}}
.card{background:var(--card);padding:20px;border-radius:12px;border:1px solid var(--border);box-shadow:0 4px 14px rgba(0,0,0,0.04)}
label{display:block;margin-top:12px;font-weight:600;font-size:13px}
input,select{width:100%;padding:10px;margin-top:6px;border-radius:8px;border:1px solid var(--border)}
.row{display:flex;gap:10px}.row .col{flex:1}
.btn{padding:10px 14px;border-radius:8px;cursor:pointer;border:none;margin-top:12px;font-weight:600}
.btn.primary{background:linear-gradient(90deg,var(--primary),var(--primary2));color:white}
.btn.secondary{background:#e2e8f0}
#status{max-height:350px;overflow:auto;display:flex;flex-direction:column;gap:8px}
.log{padding:8px 10px;border-radius:8px;background:#f8fafc;border-left:4px solid #38bdf8;font-size:13px}
.log.success{border-left-color:#22c55e}.log.warning{border-left-color:#f59e0b}.log.error{border-left-color:#ef4444}
.small{font-size:12px;color:var(--muted)}
.timer{margin-top:10px;font-weight:600}
</style>
</head>
<body>

<div class="container">
<h1>SACAQM Node Provisioning</h1>
<div class="stepper">
  <div class="step active" id="step1"><div class="step-circle">1</div><div class="step-label">Fill in all details and Capture GPS</div></div>
  <div class="step" id="step2"><div class="step-circle">2</div><div class="step-label">Connect and Send Config</div></div>
  <div class="step" id="step3"><div class="step-circle">3</div><div class="step-label">Reboot</div></div>
  <div class="step" id="step4"><div class="step-circle">4</div><div class="step-label">Verify</div></div>
</div>
<div class="grid">
<div class="card">
  <h3>Node Configuration</h3>
  <label>Description</label>
  <input id="desc" placeholder="Outdoor Node #1">
  <div class="row">
    <div class="col">
      <label>SSID</label>
      <input id="ssid">
    </div>
    <div class="col">
      <label>Password (visible)</label>
      <input id="password" type="text">
    </div>
  </div>
  <div class="row">
    <div class="col">
      <label>Type</label>
      <select id="type"><option value="0">Outdoor</option><option value="1">Indoor</option></select>
    </div>
    <div class="col">
      <label>GPS</label>
      <input id="gps" placeholder="Auto capture">
    </div>
  </div>
  <button class="btn secondary" onclick="captureGPS()">Auto Capture GPS</button>
  <button class="btn primary" onclick="connectAndSend()">Connect & Send</button>
</div>
<div class="card">
  <h3>Status & Logs</h3>
  <div id="status"></div>
  <div class="timer" id="timer"></div>
  <button class="btn secondary" id="verifyBtn" onclick="manualVerify()" disabled>Verify</button>
  <div class="small">If BLE "ESP32-Provision" is still visible after 1 minute, WiFi credentials likely failed.</div>
</div>
</div>
</div>

<script>
const SERVICE_UUID="4fafc201-1fb5-459e-8fcc-c5c9c331914b";
const SSID_CHAR_UUID="beb5483e-36e1-4688-b7f5-ea07361b26a8";
const PASS_CHAR_UUID="beb5483e-36e1-4688-b7f5-ea07361b26a9";
const DESC_CHAR_UUID="beb5483e-36e1-4688-b7f5-ea07361b26ab";
const TYPE_CHAR_UUID="beb5483e-36e1-4688-b7f5-ea07361b26ac";
const GPS_CHAR_UUID="beb5483e-36e1-4688-b7f5-ea07361b26ad";

let device;
let timerInterval;

function log(msg,type="info"){
  const div=document.createElement("div");
  div.className="log "+type;
  div.innerHTML=`${new Date().toLocaleTimeString()} — ${msg}`;
  document.getElementById("status").prepend(div);
}

function setStep(step){
  for(let i=1;i<=4;i++){
    document.getElementById("step"+i).classList.remove("active");
    if(i<step) document.getElementById("step"+i).classList.add("completed");
  }
  document.getElementById("step"+step).classList.add("active");
}

async function captureGPS(){
  if(!navigator.geolocation){log("Geolocation not supported","error");return;}
  navigator.geolocation.getCurrentPosition(pos=>{
    const coords=pos.coords.latitude.toFixed(6)+","+pos.coords.longitude.toFixed(6);
    document.getElementById("gps").value=coords;
    log("GPS captured: "+coords,"success");
  },err=>log("GPS error: "+err.message,"error"),{enableHighAccuracy:true,timeout:10000});
}

async function connectAndSend(){
  const descVal=document.getElementById("desc").value.trim();
  const ssidVal=document.getElementById("ssid").value.trim();
  const passVal=document.getElementById("password").value.trim();
  const gpsVal=document.getElementById("gps").value.trim();

  if(!descVal || !ssidVal || !passVal || !gpsVal){
    log("Please fill in all fields before connecting.","error");
    return;
  }

  try{
    setStep(1);
    log("Requesting BLE device...");

    device=await navigator.bluetooth.requestDevice({filters:[{name:"ESP32-Provision"}],optionalServices:[SERVICE_UUID]});
    const server=await device.gatt.connect();
    const service=await server.getPrimaryService(SERVICE_UUID);

    log("Connected to device","success");
    setStep(2);

    const desc=await service.getCharacteristic(DESC_CHAR_UUID);
    const type=await service.getCharacteristic(TYPE_CHAR_UUID);
    const ssid=await service.getCharacteristic(SSID_CHAR_UUID);
    const pass=await service.getCharacteristic(PASS_CHAR_UUID);
    const gps=await service.getCharacteristic(GPS_CHAR_UUID);

    await desc.writeValue(new TextEncoder().encode(descVal));
    await type.writeValue(new TextEncoder().encode(document.getElementById("type").value));
    await ssid.writeValue(new TextEncoder().encode(ssidVal));
    await pass.writeValue(new TextEncoder().encode(passVal));
    await gps.writeValue(new TextEncoder().encode(gpsVal));

    log("Credentials and GPS sent successfully","success");

    setStep(3);
    log("Switch OFF device for 5 seconds, then ON.","warning");
    startTimer();

  }catch(e){
    log("Error: "+e.message,"error");
  }
}

function startTimer(){
  let seconds=70;
  const timerEl=document.getElementById("timer");
  const verifyBtn=document.getElementById("verifyBtn");
  verifyBtn.disabled=true;

  timerInterval=setInterval(()=>{
    seconds--;
    timerEl.innerText="Verification countdown: "+seconds+"s";
    if(seconds<=0){
      clearInterval(timerInterval);
      timerEl.innerText="Verification ready";
      verifyBtn.disabled=false;
      log("1 minute elapsed. You may now verify.","success");
    }
  },1000);
}

async function manualVerify(){
  setStep(4);
  log("Checking if device is still in provisioning mode...","info");
  try{
    const testDevice = await navigator.bluetooth.requestDevice({filters:[{name:"ESP32-Provision"}]});
    if(testDevice){
      log("Device is STILL in provisioning mode. Please re-enter WiFi credentials and restart configuration.","error");
      return;
    }
  }catch(err){
    log("Device not found in provisioning mode. WiFi configuration likely successful.","success");
  }
}

log("System ready");
</script>

</body>
</html>
